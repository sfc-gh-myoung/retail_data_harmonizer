version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - SNOWFLAKE_CONNECTION_NAME=${SNOWFLAKE_CONNECTION_NAME:-default}
    volumes:
      - ~/.snowflake:/root/.snowflake:ro

  react:
    build:
      context: ..
      dockerfile: docker/Dockerfile.react
    ports:
      - "3000:80"
    depends_on:
      - api
